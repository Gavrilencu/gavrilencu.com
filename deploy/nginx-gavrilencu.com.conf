# === Pe server (Linux) ===
# 1) sudo nano /etc/nginx/sites-available/gavrilencu.com
#    Lipește tot conținutul de mai jos (fără aceste linii care încep cu # la început,
#    sau șterge comentariile din blocul server).
# 2) sudo ln -sf /etc/nginx/sites-available/gavrilencu.com /etc/nginx/sites-enabled/
# 3) sudo nginx -t && sudo systemctl reload nginx
#
# Portul 3001 îl ascultă aplicația Node (systemd). Nginx face proxy către 127.0.0.1:3001.
# SSL: sudo certbot --nginx -d gavrilencu.com -d www.gavrilencu.com

server {
	listen 80;
	listen [::]:80;
	server_name gavrilencu.com www.gavrilencu.com;

	# După ce ai certificat Let's Encrypt, Certbot adaugă listen 443 și redirectează HTTP→HTTPS.
	# location /.well-known/acme-challenge/ { root /var/www/certbot; }

	location / {
		proxy_pass http://127.0.0.1:3001;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_read_timeout 86400;
	}
}
